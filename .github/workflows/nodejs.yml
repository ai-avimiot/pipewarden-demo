name: "Node.js CI (original)"

on:
  push:
    paths:
      - 'nodejs/**'
      - '.github/workflows/nodejs.yml'
  pull_request:
    paths:
      - 'nodejs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run tests
        working-directory: nodejs
        run: npm test

      - name: Build
        working-directory: nodejs
        run: npm run build
